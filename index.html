const glyphPath = (glyph) => {
  switch (glyph) {
    case "diamond":
      return <path d="M10 2 L18 10 L10 18 L2 10 Z" />;
    case "cross":
      return <path d="M8 2H12V8H18V12H12V18H8V12H2V8H8Z" />;
    case "hex":
      return <path d="M10 1 L17.5 5.5 V14.5 L10 19 L2.5 14.5 V5.5 Z" />;
    default:
      return <rect x="3" y="3" width="14" height="14" />;
  }
};

const IndustryGlyph = ({ industry, size = 20 }) => {
  const def = INDUSTRIES.find((i) => i.key === industry);
  if (!def) return null;
  return (
    <svg width={size} height={size} viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.4">
      {glyphPath(def.glyph)}
    </svg>
  );
};

const stageColor = (stage) => {
  if (stage === "Confirmed") return { bg: "#EAF3DE", text: "#27500A", border: "#97C459" };
  if (stage === "Not Interested") return { bg: "#FAECE7", text: "#4A1B0C", border: "#D85A30" };
  if (stage === "Negotiation" || stage === "Interested") return { bg: "#FAEEDA", text: "#412402", border: "#BA7517" };
  return { bg: "#F1EFE8", text: "#2C2C2A", border: "#888780" };
};

const sentimentColor = (s) => {
  if (s === "Interested") return "#27500A";
  if (s === "Negative") return "#4A1B0C";
  if (s === "Neutral") return "#5B6573";
  return "#9A958A";
};

const fmtMoney = (n) =>
  n ? `$${n.toLocaleString("en-US")}` : "—";

const fmtDate = (d) => {
  if (!d) return "—";
  const dt = new Date(d + "T00:00:00");
  return dt.toLocaleDateString("en-US", { month: "short", day: "numeric" });
};

const isOverdue = (d) => {
  if (!d) return false;
  return new Date(d + "T00:00:00") < new Date(todayISO() + "T00:00:00");
};

function AlcorCRM() {
  const [role, setRole] = useState(null);
  const [currentStaff, setCurrentStaff] = useState(null);
  const [staffAccounts, setStaffAccounts] = useState(seedStaffAccounts);
  const [showManageStaff, setShowManageStaff] = useState(false);
  const [leads, setLeads] = useState(seedLeads);
  const [view, setView] = useState("pipeline");
  const [selectedId, setSelectedId] = useState(null);
  const [search, setSearch] = useState("");
  const [industryFilter, setIndustryFilter] = useState("All");
  const [execFilter, setExecFilter] = useState("All");
  const [showNewLead, setShowNewLead] = useState(false);
  const [dragStageId, setDragStageId] = useState(null);
  const [noteDraft, setNoteDraft] = useState("");
  const isAdmin = role === "admin";


  const executives = useMemo(
    () => Array.from(new Set(leads.map((l) => l.executive))).sort(),
    [leads]
  );

  const filteredLeads = useMemo(() => {
    return leads.filter((l) => {
      if (industryFilter !== "All" && l.industry !== industryFilter) return false;
      if (execFilter !== "All" && l.executive !== execFilter) return false;
      if (search.trim()) {
        const q = search.toLowerCase();
        const hay = (l.company + " " + l.contacts.map((c) => c.name).join(" ")).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [leads, industryFilter, execFilter, search]);

  const grouped = useMemo(() => {
    const g = {};
    STAGES.forEach((s) => (g[s] = []));
    filteredLeads.forEach((l) => g[l.stage].push(l));
    return g;
  }, [filteredLeads]);

  const metrics = useMemo(() => {
    const total = leads.length;
    const confirmed = leads.filter((l) => l.stage === "Confirmed");
    const lost = leads.filter((l) => l.stage === "Not Interested");
    const active = total - confirmed.length - lost.length;
    const pipelineValue = leads
      .filter((l) => l.stage !== "Not Interested")
      .reduce((sum, l) => sum + (l.dealValue || 0), 0);
    const conversion = total ? Math.round((confirmed.length / total) * 100) : 0;
    const dueToday = leads.filter((l) => l.nextFollowUp === todayISO()).length;
    const overdue = leads.filter((l) => isOverdue(l.nextFollowUp)).length;
    return { total, active, confirmed: confirmed.length, lost: lost.length, pipelineValue, conversion, dueToday, overdue };
  }, [leads]);

  const selected = leads.find((l) => l.id === selectedId) || null;

  function updateLead(id, patch) {
    setLeads((prev) => prev.map((l) => (l.id === id ? { ...l, ...patch } : l)));
  }

  function deleteLead(id) {
    if (!isAdmin) return;
    setLeads((prev) => prev.filter((l) => l.id !== id));
    if (selectedId === id) setSelectedId(null);
  }

  function moveStage(id, stage) {
    setLeads((prev) =>
      prev.map((l) => {
        if (l.id !== id) return l;
        const patch = { stage, lastContact: l.lastContact || todayISO() };
        if (stage === "Pitched") patch.pitched = true;
        if (stage !== "Not Interested") {
          patch.lostReason = "";
          patch.lostNote = "";
        }
        return { ...l, ...patch };
      })
    );
  }

  function addTimelineEntry(id, type, note) {
    if (!note.trim()) return;
    setLeads((prev) =>
      prev.map((l) =>
        l.id === id
          ? {
              ...l,
              lastContact: todayISO(),
              timeline: [...l.timeline, { type, date: todayISO(), note }],
            }
          : l
      )
    );
  }

  function createLead(data) {
    const id = "L-" + (1000 + leads.length + 1);
    setLeads((prev) => [
      ...prev,
      {
        id,
        company: data.company,
        industry: data.industry,
        website: data.website,
        description: data.description,
        contacts: [
          { name: data.contactName, title: data.contactTitle, email: data.contactEmail, phone: data.contactPhone, linkedin: "" },
        ],
        stage: "New Lead",
        pitched: false,
        lastContact: "",
        nextFollowUp: data.nextFollowUp || "",
        dealValue: 0,
        executive: data.executive,
        event: data.event,
        opportunity: data.opportunity,
        lostReason: "",
        lostNote: "",
        sentiment: "",
        lastResponse: "",
        timeline: [],
      },
    ]);
    setShowNewLead(false);
  }

  function handleAdminLogin() {
    setRole("admin");
    setCurrentStaff(null);
  }

  function handleStaffLogin(account) {
    setRole("user");
    setCurrentStaff(account);
  }

  function handleLogout() {
    setRole(null);
    setCurrentStaff(null);
  }

  function createStaffAccount(data) {
    setStaffAccounts((prev) => [...prev, data]);
  }

  function deleteStaffAccount(username) {
    setStaffAccounts((prev) => prev.filter((s) => s.username !== username));
  }

  if (!role) {
    return (
      <LoginScreen
        onAdminLogin={handleAdminLogin}
        onStaffLogin={handleStaffLogin}
        staffAccounts={staffAccounts}
      />
    );
  }

  return (

    <div style={styles.app}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');
        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        .alcor-serif { font-family: 'Fraunces', serif; }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-thumb { background: #D8D2C4; border-radius: 8px; }
        button { cursor: pointer; }
        input, select, textarea { font-family: 'Inter', sans-serif; }
      `}</style>

      <header style={styles.header}>
        <div style={styles.headerLeft}>
          <div style={styles.logoMark} />
          <div>
            <div className="alcor-serif" style={styles.brandName}>Alcor Wealth</div>
            <div style={styles.brandSub}>Sales &amp; Lead Console</div>
          </div>
        </div>
        <nav style={styles.nav}>
          <button
            onClick={() => setView("pipeline")}
            style={view === "pipeline" ? styles.navBtnActive : styles.navBtn}
          >
            Pipeline
          </button>
          <button
            onClick={() => setView("dashboard")}
            style={view === "dashboard" ? styles.navBtnActive : styles.navBtn}
          >
            Dashboard
          </button>
        </nav>
        <button style={styles.addLeadBtn} onClick={() => setShowNewLead(true)}>
          + Add lead
        </button>
        {isAdmin && (
          <button style={styles.manageStaffBtn} onClick={() => setShowManageStaff(true)}>
            Manage staff
          </button>
        )}
        <div style={styles.roleBadgeWrap}>
          <span style={isAdmin ? styles.roleBadgeAdmin : styles.roleBadgeUser}>
            {isAdmin ? "Admin" : currentStaff ? currentStaff.fullName : "Staff"}
          </span>
          <button style={styles.logoutBtn} onClick={handleLogout}>
            Log out
          </button>
        </div>
      </header>

      {view === "dashboard" ? (
        <Dashboard metrics={metrics} leads={leads} />
      ) : (
        <>
          <div style={styles.filterBar}>
            <input
              placeholder="Search company or contact"
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              style={styles.searchInput}
            />
            <select value={industryFilter} onChange={(e) => setIndustryFilter(e.target.value)} style={styles.select}>
              <option value="All">All industries</option>
              {INDUSTRIES.map((i) => (
                <option key={i.key} value={i.key}>{i.key}</option>
              ))}
            </select>
            <select value={execFilter} onChange={(e) => setExecFilter(e.target.value)} style={styles.select}>
              <option value="All">All executives</option>
              {executives.map((e) => (
                <option key={e} value={e}>{e}</option>
              ))}
            </select>
            <div style={styles.miniStats}>
              <span style={styles.miniStat}>
                <strong>{metrics.dueToday}</strong> due today
              </span>
              <span style={{ ...styles.miniStat, color: metrics.overdue ? "#993C1D" : "#7A8B6F" }}>
                <strong>{metrics.overdue}</strong> overdue
              </span>
            </div>
          </div>

          <div style={styles.board}>
            {STAGES.map((stage) => (
              <div
                key={stage}
                style={{
                  ...styles.column,
                  ...(dragStageId === stage ? styles.columnDragOver : {}),
                }}
                onDragOver={(e) => {
                  e.preventDefault();
                  setDragStageId(stage);
                }}
                onDragLeave={() => setDragStageId(null)}
                onDrop={(e) => {
                  const id = e.dataTransfer.getData("text/plain");
                  if (id) moveStage(id, stage);
                  setDragStageId(null);
                }}
              >
                <div style={styles.columnHeader}>
                  <span style={styles.columnTitle}>{stage}</span>
                  <span style={styles.columnCount}>{grouped[stage].length}</span>
                </div>
                <div style={styles.columnBody}>
                  {grouped[stage].map((lead) => (
                    <LeadCard
                      key={lead.id}
                      lead={lead}
                      onOpen={() => setSelectedId(lead.id)}
                      isAdmin={isAdmin}
                      onDelete={() => deleteLead(lead.id)}
                    />
                  ))}
                  {grouped[stage].length === 0 && (
                    <div style={styles.emptyCol}>No leads here yet</div>
                  )}
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {selected && (
        <LeadDrawer
          lead={selected}
          onClose={() => {
            setSelectedId(null);
            setNoteDraft("");
          }}
          onUpdate={(patch) => updateLead(selected.id, patch)}
          onMoveStage={(stage) => moveStage(selected.id, stage)}
          onAddNote={(type, note) => addTimelineEntry(selected.id, type, note)}
          noteDraft={noteDraft}
          setNoteDraft={setNoteDraft}
          isAdmin={isAdmin}
          onDelete={() => deleteLead(selected.id)}
        />
      )}

      {showNewLead && (
        <NewLeadModal
          onClose={() => setShowNewLead(false)}
          onCreate={createLead}
          executives={executives.length ? executives : ["Bilal Khan", "Ayesha Raza"]}
        />
      )}

      {showManageStaff && (
        <ManageStaffModal
          onClose={() => setShowManageStaff(false)}
          staffAccounts={staffAccounts}
          onCreate={createStaffAccount}
          onDelete={deleteStaffAccount}
        />
      )}
    </div>
  );
}

function LoginScreen({ onAdminLogin, onStaffLogin, staffAccounts }) {
  const [selectedRole, setSelectedRole] = useState(null);
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");

  function tryLogin() {
    if (selectedRole === "admin") {
      if (password === ADMIN_PASSWORD) {
        setError("");
        onAdminLogin();
      } else {
        setError("Incorrect password.");
      }
      return;
    }
    const account = staffAccounts.find((s) => s.username === username.trim());
    if (account && account.password === password) {
      setError("");
      onStaffLogin(account);
    } else {
      setError("Incorrect username or password.");
    }
  }

  return (
    <div style={styles.loginScreen}>
      <div style={styles.loginCard}>
        <div style={styles.loginLogoMark} />
        <div className="alcor-serif" style={styles.loginTitle}>Alcor Wealth</div>
        <div style={styles.loginSub}>Sales &amp; Lead Console</div>

        {!selectedRole ? (
          <div style={styles.loginChoices}>
            <button style={styles.loginUserBtn} onClick={() => setSelectedRole("user")}>
              Staff login
            </button>
            <button style={styles.loginAdminLink} onClick={() => setSelectedRole("admin")}>
              Admin login
            </button>
          </div>
        ) : (
          <div style={styles.loginAdminBox}>
            {selectedRole === "user" && (
              <>
                <div style={styles.fieldLabel}>Username</div>
                <input
                  autoFocus
                  value={username}
                  onChange={(e) => {
                    setUsername(e.target.value);
                    setError("");
                  }}
                  style={styles.input}
                  placeholder="e.g. bilal.khan"
                />
              </>
            )}
            <div style={{ ...styles.fieldLabel, marginTop: selectedRole === "user" ? 10 : 0 }}>
              {selectedRole === "admin" ? "Admin password" : "Password"}
            </div>
            <input
              type="password"
              autoFocus={selectedRole === "admin"}
              value={password}
              onChange={(e) => {
                setPassword(e.target.value);
                setError("");
              }}
              onKeyDown={(e) => {
                if (e.key === "Enter") tryLogin();
              }}
              style={styles.input}
              placeholder="Enter password"
            />
            {error && <div style={styles.loginError}>{error}</div>}
            <div style={styles.loginAdminActions}>
              <button
                style={styles.cancelBtn}
                onClick={() => {
                  setSelectedRole(null);
                  setUsername("");
                  setPassword("");
                  setError("");
                }}
              >
                Back
              </button>
              <button style={styles.createBtn} onClick={tryLogin}>
                Log in
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


function LeadCard({ lead, onOpen, isAdmin, onDelete }) {
  const sc = stageColor(lead.stage);
  const overdue = isOverdue(lead.nextFollowUp);
  return (
    <div
      draggable
      onDragStart={(e) => e.dataTransfer.setData("text/plain", lead.id)}
      onClick={onOpen}
      style={styles.card}
    >
      <div style={styles.cardTop}>
        <span style={{ ...styles.glyphWrap, color: "#C9A24B" }}>
          <IndustryGlyph industry={lead.industry} size={16} />
        </span>
        <span style={{ ...styles.cardCompany, flex: 1 }}>{lead.company}</span>
        {isAdmin && (
          <button
            aria-label="Delete lead"
            onClick={(e) => {
              e.stopPropagation();
              if (window.confirm(`Delete ${lead.company}? This cannot be undone.`)) {
                onDelete();
              }
            }}
            style={styles.cardDeleteBtn}
          >
            ×
          </button>
        )}
      </div>
      <div style={styles.cardEvent}>{lead.event}</div>
      <div style={styles.cardMetaRow}>
        <span style={styles.cardExec}>{lead.executive}</span>
        {lead.dealValue > 0 && <span style={styles.cardValue}>{fmtMoney(lead.dealValue)}</span>}
      </div>
      <div style={styles.cardBottomRow}>
        <span style={{ ...styles.followPill, color: overdue ? "#993C1D" : "#5B6573", borderColor: overdue ? "#D85A30" : "#D8D2C4" }}>
          {lead.nextFollowUp ? `Follow up ${fmtDate(lead.nextFollowUp)}` : "No follow-up set"}
        </span>
      </div>
    </div>
  );
}

function LeadDrawer({ lead, onClose, onUpdate, onMoveStage, onAddNote, noteDraft, setNoteDraft, isAdmin, onDelete }) {
  const [noteType, setNoteType] = useState("Note");

  return (
    <div style={styles.overlay} onClick={onClose}>
      <div style={styles.drawer} onClick={(e) => e.stopPropagation()}>

          <div style={styles.sectionLabel}>Activity timeline</div>
          <div style={styles.timeline}>
            {lead.timeline.length === 0 && <div style={styles.emptyTimeline}>No activity logged yet.</div>}
            {lead.timeline.slice().reverse().map((t, i) => (
              <div key={i} style={styles.timelineItem}>
                <div style={styles.timelineDot} />
                <div>
                  <div style={styles.timelineMeta}>
                    <span style={styles.timelineType}>{t.type}</span>
                    <span style={styles.timelineDate}>{fmtDate(t.date)}</span>
                  </div>
                  <div style={styles.timelineNote}>{t.note}</div>

          <div style={styles.addNoteRow}>
            <select value={noteType} onChange={(e) => setNoteType(e.target.value)} style={styles.noteTypeSelect}>
              <option>Note</option>
              <option>Call</option>
              <option>Email</option>
              <option>Meeting</option>
            </select>
            <input
              placeholder="Log an interaction..."
              value={noteDraft}
              onChange={(e) => setNoteDraft(e.target.value)}
              onKeyDown={(e) => {
                if (e.key === "Enter" && noteDraft.trim()) {
                  onAddNote(noteType, noteDraft);
                  setNoteDraft("");
                }
              }}
              style={styles.noteInput}
            />
            <button
              style={styles.noteAddBtn}
              onClick={() => {
                if (noteDraft.trim()) {
                  onAddNote(noteType, noteDraft);
                  setNoteDraft("");
                }
              }}
            >
              Add
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ManageStaffModal({ onClose, staffAccounts, onCreate, onDelete }) {
  const [form, setForm] = useState({ username: "", password: "", fullName: "", title: "" });
  const [formError, setFormError] = useState("");

  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));

  function handleCreate() {
    const username = form.username.trim();
    if (!username || !form.password.trim() || !form.fullName.trim()) {
      setFormError("Username, password, and full name are required.");
      return;
    }
    if (staffAccounts.some((s) => s.username === username)) {
      setFormError("That username is already taken.");
      return;
    }
    onCreate({ username, password: form.password, fullName: form.fullName.trim(), title: form.title.trim() });
    setForm({ username: "", password: "", fullName: "", title: "" });
    setFormError("");
  }

  return (
    <div style={styles.overlay} onClick={onClose}>
      <div style={styles.modal} onClick={(e) => e.stopPropagation()}>
        <div style={styles.modalHeader}>

function Dashboard({ metrics, leads }) {
  const byIndustry = useMemo(() => {
    const m = {};
    INDUSTRIES.forEach((i) => (m[i.key] = 0));
    leads.forEach((l) => (m[l.industry] = (m[l.industry] || 0) + 1));
    return m;
  }, [leads]);

  const byExec = useMemo(() => {
    const m = {};
    leads.forEach((l) => {
      if (!m[l.executive]) m[l.executive] = { total: 0, confirmed: 0 };
      m[l.executive].total += 1;
      if (l.stage === "Confirmed") m[l.executive].confirmed += 1;
    });
    return m;
  }, [leads]);

  const dueSoon = leads
    .filter((l) => l.nextFollowUp)
    .sort((a, b) => new Date(a.nextFollowUp) - new Date(b.nextFollowUp))
    .slice(0, 6);

  const maxIndustry = Math.max(1, ...Object.values(byIndustry));

  return (
    <div style={styles.dashboard}>
      <div style={styles.metricGrid}>
        <Metric label="Total leads" value={metrics.total} />
        <Metric label="Active in pipeline" value={metrics.active} />
        <Metric label="Confirmed" value={metrics.confirmed} accent="#27500A" />
        <Metric label="Pipeline value" value={fmtMoney(metrics.pipelineValue)} />
        <Metric label="Conversion rate" value={`${metrics.conversion}%`} />
        <Metric label="Follow-ups due today" value={metrics.dueToday} accent={metrics.dueToday ? "#854F0B" : undefined} />
      </div>

      <div style={styles.dashRow}>
        <div style={styles.panel}>
          <div style={styles.panelTitle}>Leads by industry</div>
          {INDUSTRIES.map((ind) => (
            <div key={ind.key} style={styles.barRow}>
              <span style={{ ...styles.barLabel, color: "#C9A24B" }}>
                <IndustryGlyph industry={ind.key} size={14} />
              </span>
              <span style={styles.barName}>{ind.key}</span>
              <div style={styles.barTrack}>
                <div
                  style={{
                    ...styles.barFill,
                    width: `${(byIndustry[ind.key] / maxIndustry) * 100}%`,
                  }}
                />
              </div>
              <span style={styles.barCount}>{byIndustry[ind.key]}</span>
            </div>
          ))}
        </div>

        <div style={styles.panel}>
          <div style={styles.panelTitle}>Performance by executive</div>
          {Object.entries(byExec).map(([name, d]) => (
            <div key={name} style={styles.execRow}>
              <span style={styles.execName}>{name}</span>
              <span style={styles.execStat}>{d.confirmed} / {d.total} confirmed</span>
            </div>
          ))}
        </div>
      </div>

      <div style={styles.panel}>
        <div style={styles.panelTitle}>Upcoming follow-ups</div>
        {dueSoon.length === 0 && <div style={styles.emptyTimeline}>Nothing scheduled.</div>}
        {dueSoon.map((l) => (
          <div key={l.id} style={styles.followRow}>
            <span style={{ color: "#C9A24B" }}>
              <IndustryGlyph industry={l.industry} size={15} />
            </span>
            <span style={styles.followCompany}>{l.company}</span>
            <span style={styles.followExec}>{l.executive}</span>
            <span style={{ ...styles.followDate, color: isOverdue(l.nextFollowUp) ? "#993C1D" : "#5B6573" }}>
              {fmtDate(l.nextFollowUp)}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}
